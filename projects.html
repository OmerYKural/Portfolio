<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omer Kural | Projects</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <div class="logo">OK</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
  <div class="toggle" onclick="toggleMode()">🌙</div>
</nav>

<section class="hero">
<h1>Projects</h1>
</section>

<div class="projects" id="repoList"></div>

<script>
fetch("https://api.github.com/users/YOUR_USERNAME/repos")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("repoList");
  data.slice(0,6).forEach(repo => {
    const div = document.createElement("div");
    div.className = "project";
    div.innerHTML = `
      <h3>${repo.name}</h3>
      <p>${repo.description || "No description"}</p>
      <a href="${repo.html_url}" target="_blank" class="btn">View</a>
    `;
    container.appendChild(div);
  });
});
</script>
</body>
</html>
